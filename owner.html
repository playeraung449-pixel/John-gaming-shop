<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0f1e; --glass-bg: rgba(255, 255, 255, 0.05); --neon-cyan: #00ffe7; --neon-blue: #3b82f6; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408); min-height: 100vh; color: var(--text-color); padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0, 255, 231, 0.2); margin-bottom: 30px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .owner-card { background: var(--glass-bg); border: 1px solid var(--neon-cyan); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        .owner-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon-cyan); margin-bottom: 20px; }
        .owner-name { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .owner-uid { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 30px; cursor: pointer; }
        .social-links { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
        .social-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 15px; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .social-btn:hover { border-color: var(--neon-cyan); background: rgba(0, 255, 231, 0.1); }
        .fa-tiktok { color: #ff0050; }
        .fa-telegram { color: #0088cc; }
        .fa-facebook { color: #1877f2; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h2>Owner Info</h2></header>
    <div class="owner-card">
        <img src="https://via.placeholder.com/100" class="owner-img">
        <div class="owner-name">Johnny</div>
        <div class="owner-uid" onclick="copyUID()">UID: <span id="owner-uid">6427719618</span> <i class="far fa-copy"></i></div>
        <div class="social-links">
            <a href="https://tiktok.com/@johnny_mmk" class="social-btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="https://t.me/Johnny_AZM" class="social-btn"><i class="fab fa-telegram"></i> Telegram</a>
            <a href="https://facebook.com/jucksuki" class="social-btn"><i class="fab fa-facebook"></i> Facebook</a>
        </div>
    </div>
    <script>
        function copyUID() { const uid = document.getElementById('owner-uid').innerText; navigator.clipboard.writeText(uid); alert("UID ကူးယူပြီးပါပြီ"); }
    </script>
</body>
</html>
