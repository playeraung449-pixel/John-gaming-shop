<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဂိမ်းများ - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0f1e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-cyan: #00ffe7;
            --neon-blue: #3b82f6;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            min-height: 100vh;
            color: var(--text-color);
            padding-bottom: 80px;
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(0, 255, 231, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 231, 0.2);
        }

        .game-img {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h3 {
            font-size: 14px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 12px;
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>ဂိမ်းများ</h2>

            <div class="game-info">
                <h3>MLBB</h3>
            </div>
        </a>
        <a href="free.html" class="game-card">
            <div class="game-img" style="background-image: url('https://logos-world.net/wp-content/uploads/2022/04/Garena-Free-Fire-Logo.png'); background-color: #1a1a1a;"></div>
            <div class="game-info">
                <h3>Free Fire</h3>
            </div>
        </a>
        <a href="hok.html" class="game-card">
            <div class="game-img" style="background-image: url('https://static.wikia.nocookie.net/honor-of-kings/images/c/c3/Honor_of_Kings_Global_Logo.png'); background-color: #1a1a1a;"></div>
            <div class="game-info">
                <h3>HOK</h3>
            </div>
        </a>
        <a href="genshin.html" class="game-card">

            <div class="game-info">

        </a>
        <a href="magicchess.html" class="game-card">
            <div class="game-img" style="background-image: url('https://play-lh.googleusercontent.com/r_z_h0YxV_L8U8_K6S8_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K_Z_K=w240-h480-rw'); background-color: #1a1a1a;"></div>
            <div class="game-info">
                <h3>Magic Chess</h3>

        </a>
        <a href="pubg.html" class="game-card">

            <div class="game-info">
                <h3>PUBG</h3>
            </div>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            ပင်မ
        </a>
        <a href="history.html" class="nav-item">
            <i class="fas fa-history"></i>
            မှတ်တမ်း
        </a>
        <a href="messages.html" class="nav-item">
            <i class="fas fa-comment-dots"></i>

        <a href="aichat.html" class="nav-item">

    </nav>

    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkAuth() {

</body>
</html>
