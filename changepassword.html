<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စကားဝှက်ပြောင်းရန် - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0f1e; --glass-bg: rgba(255, 255, 255, 0.05); --neon-cyan: #00ffe7; --neon-blue: #3b82f6; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408); min-height: 100vh; color: var(--text-color); padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0, 255, 231, 0.2); margin-bottom: 30px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .form-container { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; width: 90%; max-width: 400px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; color: white; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue)); border: none; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .strength { height: 5px; width: 100%; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h2>စကားဝှက်ပြောင်းရန်</h2></header>
    <div class="form-container">
        <div class="input-group"><label>စကားဝှက်အသစ်</label><input type="password" id="new-password" oninput="checkStrength(this.value)"><div class="strength"><div id="strength-bar" class="strength-bar"></div></div></div>
        <div class="input-group"><label>စကားဝှက်ကို ထပ်မံရိုက်ပါ</label><input type="password" id="confirm-password"></div>
        <button class="btn" onclick="updatePassword()">ပြောင်းလဲမည်</button>
    </div>
    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        function checkStrength(p) {
            const bar = document.getElementById('strength-bar');
            let s = 0; if (p.length > 6) s += 33; if (/[A-Z]/.test(p)) s += 33; if (/[0-9]/.test(p)) s += 34;
            bar.style.width = s + "%"; bar.style.background = s < 40 ? "#ff4d4d" : s < 80 ? "#ffcc00" : "#00ff00";
        }
        async function updatePassword() {
            const p = document.getElementById('new-password').value;
            const c = document.getElementById('confirm-password').value;
            if (p !== c) { alert("စကားဝှက်များ မတူညီပါ။"); return; }
            const { error } = await supabase.auth.updateUser({ password: p });
            if (error) alert(error.message); else { alert("စကားဝှက် ပြောင်းလဲပြီးပါပြီ။"); window.location.href = 'home.html'; }
        }
    </script>
</body>
</html>
