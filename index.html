<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပင်မစာမျက်နှာ - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0f1e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-cyan: #00ffe7;
            --neon-blue: #3b82f6;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            min-height: 100vh;
            color: var(--text-color);
            padding-bottom: 80px;
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 231, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .user-info h3 {
            font-size: 16px;
        }

        .uid-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        .balance-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 231, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-info h4 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        .topup-btn {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .menu-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 231, 0.2);
        }

        .menu-item i {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--neon-cyan);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 12px;
        }

        .nav-item.active {
            color: var(--neon-cyan);
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header>
        <div class="user-profile">
            <div class="avatar" id="avatar-initial">J</div>
            <div class="user-info">
                <h3 id="user-name">Loading...</h3>
                <div class="uid-container" onclick="copyUID()">
                    UID: <span id="user-uid">********</span>
                    <i class="far fa-copy"></i>
                </div>
            </div>
        </div>
        <div class="notices-icon">
            <a href="notices.html" style="color: white;"><i class="far fa-bell"></i></a>
        </div>
    </header>

    <div class="balance-card">
        <div class="balance-info">
            <h4>လက်ကျန်ငွေ</h4>
            <div class="balance-amount"><span id="user-balance">0</span> Ks</div>
        </div>
        <a href="payment.html" class="topup-btn">ငွေဖြည့်ရန်</a>
    </div>

    <div class="grid-menu">
        <a href="game.html" class="menu-item">
            <i class="fas fa-gamepad"></i>
            <div>ဂိမ်းများ</div>
        </a>
        <a href="topbuyer.html" class="menu-item">
            <i class="fas fa-trophy"></i>
            <div>Top Buyer</div>
        </a>
        <a href="spin.html" class="menu-item">
            <i class="fas fa-dharmachakra"></i>
            <div>Spin Wheel</div>
        </a>
        <a href="others.html" class="menu-item">
            <i class="fas fa-th-large"></i>
            <div>အခြားဝန်ဆောင်မှုများ</div>
        </a>
        <a href="accounttrading.html" class="menu-item">
            <i class="fas fa-exchange-alt"></i>
            <div>အကောင့်အရောင်းအဝယ်</div>
        </a>
        <a href="owner.html" class="menu-item">
            <i class="fas fa-user-tie"></i>
            <div>Owner</div>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <i class="fas fa-home"></i>
            ပင်မ
        </a>
        <a href="history.html" class="nav-item">
            <i class="fas fa-history"></i>
            မှတ်တမ်း
        </a>
        <a href="messages.html" class="nav-item">
            <i class="fas fa-comment-dots"></i>
            မက်ဆေ့ချ်
        </a>
        <a href="aichat.html" class="nav-item">
            <i class="fas fa-robot"></i>
            AI Chat
        </a>
        <a href="howtouse.html" class="nav-item">
            <i class="fas fa-question-circle"></i>
            အသုံးပြုနည်း
        </a>
    </nav>

    <div id="toast" class="toast"></div>

    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            loadUserData(session.user.id);
        }

        async function loadUserData(userId) {
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('id', userId)
                .single();

            if (data) {
                document.getElementById('user-name').innerText = data.name || 'အမည်မရှိ';
                document.getElementById('avatar-initial').innerText = (data.name || 'U').charAt(0).toUpperCase();
                document.getElementById('user-uid').innerText = data.id.substring(0, 8);
                document.getElementById('user-balance').innerText = data.balance.toLocaleString();
                
                if (data.role === 'admin') {
                    // Show admin link if needed
                }
            }
        }

        function copyUID() {
            const uid = document.getElementById('user-uid').innerText;
            navigator.clipboard.writeText(uid);
            showToast("UID ကူးယူပြီးပါပြီ");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
