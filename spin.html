<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0f1e; --glass-bg: rgba(255, 255, 255, 0.05); --neon-cyan: #00ffe7; --neon-blue: #3b82f6; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408); min-height: 100vh; color: var(--text-color); padding-bottom: 20px; text-align: center; }
        header { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0, 255, 231, 0.2); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .spin-container { padding: 40px 20px; }
        .tokens-badge { background: var(--glass-bg); border: 1px solid var(--neon-cyan); padding: 10px 20px; border-radius: 40px; display: inline-block; margin-bottom: 30px; }
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 0 auto 40px; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--neon-cyan); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#00ffe7 0% 20%, #3b82f6 20% 40%, #00ffe7 40% 60%, #3b82f6 60% 80%, #00ffe7 80% 100%); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: white; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .spin-btn { background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue)); border: none; padding: 15px 40px; border-radius: 40px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0f1e; border: 1px solid var(--neon-cyan); border-radius: 30px; padding: 30px; width: 90%; max-width: 400px; }
        .prize-text { font-size: 24px; color: var(--neon-cyan); margin: 20px 0; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h2>Spin Wheel</h2></header>
    <div class="spin-container">
        <div class="tokens-badge">Spin Tokens: <span id="spin-tokens">0</span></div>
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel"></div>
        </div>
        <button id="spin-btn" class="spin-btn" onclick="startSpin()">SPIN NOW</button>
    </div>
    <div id="result-modal" class="modal"><div class="modal-content"><h3>ဂုဏ်ယူပါတယ်!</h3><div id="prize-display" class="prize-text"></div><button class="spin-btn" onclick="closeModal()">အိုကေ</button></div></div>
    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let tokens = 0;
        let isSpinning = false;
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            const { data: user } = await supabase.from('users').select('*').eq('id', session.user.id).single();
            tokens = user.spin_tokens;
            document.getElementById('spin-tokens').innerText = tokens;
        }
        async function startSpin() {
            if (tokens < 1 || isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            const { data: { session } } = await supabase.auth.getSession();
            const userId = session.user.id;
            const { data: user } = await supabase.from('users').select('*').eq('id', userId).single();
            await supabase.from('users').update({ spin_tokens: user.spin_tokens - 1 }).eq('id', userId);
            tokens--;
            document.getElementById('spin-tokens').innerText = tokens;
            const rand = Math.random() * 100;
            let prize = ""; let amount = 0; let rotate = 0;
            if (rand < 60) { prize = "50 Ks"; amount = 50; rotate = 720 + 36; }
            else if (rand < 80) { prize = "2 Spins"; amount = 2; rotate = 720 + 108; }
            else if (rand < 90) { prize = "10% Discount"; amount = 0; rotate = 720 + 180; }
            else if (rand < 99) { prize = "100 Ks"; amount = 100; rotate = 720 + 252; }
            else { prize = "Starlight Card"; amount = 1; rotate = 720 + 324; }
            document.getElementById('wheel').style.transform = `rotate(${rotate}deg)`;
            setTimeout(async () => {
                if (prize === "50 Ks" || prize === "100 Ks") { await supabase.from('users').update({ balance: user.balance + amount }).eq('id', userId); }
                else if (prize === "2 Spins") { tokens += 2; await supabase.from('users').update({ spin_tokens: user.spin_tokens + 1 }).eq('id', userId); document.getElementById('spin-tokens').innerText = tokens; }
                else if (prize === "Starlight Card") { await supabase.from('users').update({ starlight_cards: user.starlight_cards + 1 }).eq('id', userId); }
                await supabase.from('spin_history').insert({ user_id: userId, prize: prize, amount: amount });
                document.getElementById('prize-display').innerText = prize;
                document.getElementById('result-modal').style.display = 'flex';
                isSpinning = false;
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }
        function closeModal() { document.getElementById('result-modal').style.display = 'none'; document.getElementById('wheel').style.transform = 'rotate(0deg)'; }
        window.onload = checkAuth;
    </script>
</body>
</html>
