<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မက်ဆေ့ချ် - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0f1e; --glass-bg: rgba(255, 255, 255, 0.05); --neon-cyan: #00ffe7; --neon-blue: #3b82f6; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408); height: 100vh; color: var(--text-color); display: flex; flex-direction: column; }
        header { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0, 255, 231, 0.2); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; position: relative; }
        .msg-user { align-self: flex-end; background: var(--neon-cyan); color: #000; border-bottom-right-radius: 2px; }
        .msg-admin { align-self: flex-start; background: rgba(255, 255, 255, 0.1); color: #fff; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .input-area { background: var(--glass-bg); padding: 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 12px 20px; color: white; outline: none; }
        .send-btn { background: var(--neon-cyan); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; cursor: pointer; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h2>Admin နှင့် စကားပြောရန်</h2></header>
    <div id="chat-box"></div>
    <div class="input-area"><input type="text" id="msg-input" placeholder="စာရိုက်ပါ..."><button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let currentUserId = null;
        async function initChat() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUserId = session.user.id;
            loadMessages();
            supabase.channel('chat_messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `user_id=eq.${currentUserId}` }, payload => { displayMessage(payload.new); }).subscribe();
        }
        async function loadMessages() {
            const { data } = await supabase.from('chat_messages').select('*').eq('user_id', currentUserId).order('created_at', { ascending: true });
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            data.forEach(msg => displayMessage(msg));
        }
        function displayMessage(msg) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${msg.sender === 'user' ? 'msg-user' : 'msg-admin'}`;
            div.innerText = msg.text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await supabase.from('chat_messages').insert({ user_id: currentUserId, sender: 'user', text: text });
        }
        window.onload = initChat;
    </script>
</body>
</html>
