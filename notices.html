<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အသိပေးချက်များ - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0f1e; --glass-bg: rgba(255, 255, 255, 0.05); --neon-cyan: #00ffe7; --neon-blue: #3b82f6; --text-color: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408); min-height: 100vh; color: var(--text-color); padding-bottom: 20px; }
        header { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0, 255, 231, 0.2); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        .notice-list { padding: 20px; }
        .notice-card { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; gap: 15px; }
        .notice-icon { width: 45px; height: 45px; background: rgba(0, 255, 231, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); font-size: 20px; flex-shrink: 0; }
        .notice-content h4 { margin-bottom: 5px; color: var(--neon-cyan); }
        .notice-content p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 5px; }
        .notice-date { font-size: 11px; color: rgba(255,255,255,0.4); }
        .badge { font-size: 10px; background: var(--neon-blue); padding: 2px 6px; border-radius: 5px; margin-left: 5px; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h2>အသိပေးချက်များ</h2></header>
    <div class="notice-list" id="notice-list"></div>
    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        async function loadNotices() {
            const { data: { session } } = await supabase.auth.getSession();
            const userId = session ? session.user.id : null;
            let query = supabase.from('notifications').select('*').or(`user_id.is.null,user_id.eq.${userId}`).order('created_at', { ascending: false });
            const { data } = await query;
            const list = document.getElementById('notice-list');
            const icons = { 'announcement': 'fa-bullhorn', 'warning': 'fa-exclamation-circle', 'promotion': 'fa-gift', 'update': 'fa-sync', 'event': 'fa-calendar-star' };
            data.forEach(n => {
                const card = document.createElement('div');
                card.className = 'notice-card';
                card.innerHTML = `<div class="notice-icon"><i class="fas ${icons[n.type] || 'fa-bell'}"></i></div><div class="notice-content"><h4>${n.title}${n.badge ? `<span class="badge">${n.badge}</span>` : ''}</h4><p>${n.message}</p><div class="notice-date">${new Date(n.created_at).toLocaleString()}</div></div>`;
                list.appendChild(card);
            });
        }
        window.onload = loadNotices;
    </script>
</body>
</html>
