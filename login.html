<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အကောင့်ဝင်ရန် - John Gaming Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0f1e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-cyan: #00ffe7;
            --neon-blue: #3b82f6;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 231, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 231, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 231, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 231, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            border-radius: 40px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 231, 0.4);
        }

        .link {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .link a {
            color: var(--neon-cyan);
            text-decoration: none;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--neon-cyan);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>John Gaming Shop</h1>
        <div class="input-group">
            <label>အီးမေးလ်</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>စကားဝှက်</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div id="error-msg" class="error-msg"></div>
        <div id="loader" class="loader"></div>
        <button class="btn" onclick="login()">အကောင့်ဝင်ရန်</button>
        <div class="link">
            အကောင့်မရှိသေးဘူးလား? <a href="signup.html">အသစ်ဖွင့်ရန်</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://obtfamhkvsodmrfjetsm.supabase.co';
        const supabaseKey = 'sb_publishable_KpHT5E9yRy9y1jkDZN9RAg_WHBJMDj9';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const loader = document.getElementById('loader');

            // Clear previous error
            errorMsg.style.display = 'none';
            errorMsg.innerText = '';

            // Validate inputs
            if (!email || !password) {
                errorMsg.innerText = "ကျေးဇူးပြု၍ အီးမေးလ်နှင့် စကားဝှက် ထည့်ပါ။";
                errorMsg.style.display = 'block';
                return;
            }

            loader.style.display = 'block';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                loader.style.display = 'none';

                if (error) {
                    errorMsg.innerText = "အီးမေးလ် သို့မဟုတ် စကားဝှက် မှားနေပါသည်။";
                    errorMsg.style.display = 'block';
                    return;
                }

                // ✅ Login success - redirect based on role or email
                if (email === 'playeraung449@gmail.com') {
                    window.location.href = 'admin-panel.html';
                } else {
                    window.location.href = 'home.html';
                }

            } catch (err) {
                loader.style.display = 'none';
                errorMsg.innerText = "အကောင့်ဝင်ရန် အဆက်အသွယ် ပျက်နေပါသည်။";
                errorMsg.style.display = 'block';
            }
        }

        // Check if already logged in
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const email = session.user.email;
                if (email === 'playeraung449@gmail.com') {
                    window.location.href = 'admin-panel.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        };
    </script>
</body>
</html>
